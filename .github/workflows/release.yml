name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Build (no console)
        run: go build -trimpath -ldflags "-s -w -H=windowsgui" -o YtDownloader.exe .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: YtDownloader.exe